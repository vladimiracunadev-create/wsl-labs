# wsl-labs · NGINX
# Sirve un sitio estático simple en localhost:8080 (fuente de verdad: labs.config.json).
# El catálogo espera el puerto 8080 (NO 80), por eso nginx escucha aquí en 8080.
server {
    listen 8080;
    server_name localhost;

    root /var/www/wsl-labs;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
