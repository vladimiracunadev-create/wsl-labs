# wsl-labs · mini-servidor-completo
# vhost nginx dedicado en :8090 que representa el stack combinado
# (web nginx + base de datos postgresql). Sirve una landing sin archivos
# (return 200) para no depender de permisos de /mnt/c.
server {
    listen 8090 default_server;
    listen [::]:8090 default_server;
    server_name _;

    location / {
        default_type text/html;
        return 200 "<!doctype html><meta charset=utf-8><title>wsl-labs mini-servidor</title><h1>wsl-labs - mini-servidor-completo</h1><p>Stack combinado operativo:</p><ul><li>nginx (este endpoint) en :8090</li><li>postgresql en :5432</li></ul>";
    }

    location /health {
        default_type application/json;
        return 200 "{\"status\":\"ok\",\"service\":\"mini-servidor\"}";
    }
}
