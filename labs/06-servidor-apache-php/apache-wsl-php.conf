# wsl-labs · Apache + PHP
# Sirve PHP en localhost:8081 (fuente de verdad: labs.config.json).
# El catálogo espera el puerto 8081 (NO 8080, que ya usa nginx en el lab 05).
#
# IMPORTANTE: un VirtualHost no basta para que Apache escuche en 8081.
# Apache necesita ADEMÁS una directiva `Listen 8081`. Puede ir en:
#   - /etc/apache2/ports.conf   (lo habitual en Debian/Ubuntu), o
#   - esta misma conf (descomenta la línea de abajo).
# El script scripts/install-apache-php.sh añade `Listen 8081` en ports.conf
# de forma idempotente, por eso aquí queda comentada para no duplicarla.
#
# Listen 8081

<VirtualHost *:8081>
    ServerName localhost
    DocumentRoot /var/www/wsl-php

    <Directory /var/www/wsl-php>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/wsl-php-error.log
    CustomLog ${APACHE_LOG_DIR}/wsl-php-access.log combined
</VirtualHost>
