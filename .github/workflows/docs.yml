name: docs

# ─────────────────────────────────────────────────────────────────────────────
# Lint de documentacion Markdown con markdownlint-cli2.
# Se dispara solo cuando cambian archivos .md (o el propio workflow/config).
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["**"]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  lint:
    name: Lint markdown files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**/*.md
